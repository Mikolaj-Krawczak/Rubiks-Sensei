<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Sensei - Select Cube</title>
    <link rel="stylesheet" href="../css/wybor-kotstek.css">
</head>

<body>

<header-component></header-component>

<div class="content">
    <div class="background-container"></div>

    <div class="karate-belt">
        <h2>6 Kyu</h2>
    </div>

    <div class="cubes-container">
        <div class="cubes-row">
            <div class="cube-tile" onclick="openPage('training-2x2.html')">
                <div class="cube-image">
                    <img src="../assets/images/cube-2x2.png" alt="2x2 Cube">
                </div>
                <div class="cube-title">2 x 2</div>
            </div>

            <div class="cube-tile" onclick="openPage('training-3x3.html')">
                <div class="cube-image">
                    <img src="../assets/images/cube-3x3.png" alt="3x3 Cube">
                </div>
                <div class="cube-title">3 x 3</div>
            </div>

            <div class="cube-tile" onclick="openPage('training-4x4.html')">
                <div class="cube-image">
                    <img src="../assets/images/cube-4x4.png" alt="4x4 Cube">
                </div>
                <div class="cube-title">4 x 4</div>
            </div>

            <div class="cube-tile" onclick="openPage('training-pyraminx.html')">
                <div class="cube-image">
                    <img src="../assets/images/pyraminx.png" alt="Pyraminx">
                </div>
                <div class="cube-title">Pyraminx</div>
            </div>
        </div>
    </div>
</div>

<script src="../components/header/header.js"></script>
<script src="../scripts/handleNavigation.js"></script>
</body>

</html>
