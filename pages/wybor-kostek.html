<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Sensei - Wybór Kostki</title>
    <link rel="stylesheet" href="../css/wybor-kotstek.css">
</head>

<body>

    <header-component></header-component>

    <div class="content">
        <div class="background-container">
    </div>

        <div class="cubes-container">
            <div class="cubes-row">
                <div class="cube-tile">
                    <div class="cube-image">
                        <img src="../assets/images/cube-2x2.png" alt="Kostka 2x2">
                    </div>
                    <div class="cube-title">2 x 2</div>
                </div>

                <div class="cube-tile" onclick="openPage('bibliotekaAlgorytmow.html')">
                    <div class="cube-image">
                        <img src="../assets/images/cube-3x3.png" alt="Kostka 3x3">
                    </div>
                    <div class="cube-title">3 x 3</div>
                </div>

                <div class="cube-tile">
                    <div class="cube-image">
                        <img src="../assets/images/cube-4x4.png" alt="Kostka 4x4">
                    </div>
                    <div class="cube-title">4 x 4</div>
                </div>

                <div class="cube-tile">
                    <div class="cube-image">
                        <img src="../assets/images/pyraminx.png" alt="Pyraminx">
                    </div>
                    <div class="cube-title" id="pyraminx">Pyraminx</div>
                </div>
            </div>
        </div>
    </div>

    <script src="../components/header/header.js"></script>
    <script src="../scripts/handleNavigation.js"></script>
</body>

</html>
