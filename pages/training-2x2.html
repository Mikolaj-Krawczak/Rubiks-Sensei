<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Sensei - Trening 2x2</title>
    <link rel="stylesheet" href="../css/training-2x2.css">
</head>
<body>
    <header-component></header-component>

    <div class="content">
        <div class="left-panel">
            <div class="training-panel">
                <h1>Training</h1>
                <div class="training-details">
                    <div class="mode-selection">
                        <div class="mode-selection-buttons">
                            <button id="single-solve-btn" class="btn mode-btn active">Single</button>
                            <button id="series-solve-btn" class="btn mode-btn">Series</button>
                        </div>
                        <!--                    Custom select-->
                        <div id="series-count" class="count-btn">
                            <div class="selected-series-count">
                                <span id="selected-series-count-span">5</span>
                                <span id="selected-series-count-arrow">v</span>
                            </div>
                            <ul class="series-count-options">
                                <li>1</li>
                                <li>2</li>
                                <li>3</li>
                                <li>4</li>
                                <li class="series-count-options-selected">5</li>
                                <li>6</li>
                                <li>7</li>
                                <li>8</li>
                                <li>9</li>
                                <li>10</li>
                            </ul>
                        </div>
                    </div>
                    <div class="scramble-section">
                        <p>Scramble length:</p>
                        <div id="scramble-length" class="count-btn">
                            <div class="scramble-length-button">
                                <span id="scramble-length-span">12</span>
                                <span>v</span>
                            </div>
                            <div class="scramble-length-menu">
                                <div onclick="this.parentNode.querySelector('input[type=number]').stepDown()"
                                        class="minus"></div>
                                <input type="number" min=5 max=20 id="scrabble-length-input" value="12">
                                <div onclick="this.parentNode.querySelector('input[type=number]').stepUp()"
                                        class="plus"></div>
                            </div>
                        </div>
                    </div>
                    <button id="regen-scramble-btn" class="btn">Scramble</button>
                    
                    <div>
                        <p>Scramble algorithm:</p>
                        <p id="scramble-display"></p>
                    </div>
                    <div class="timer-section">
                        <div id="series-times-display"></div>
                        <h1 id="timer-display" class="timer">0.00</h1>
                        <p id="hint-display" class="hint">Press SPACE to start</p>
                    </div>
                </div>
            </div>
        </div>
        <div id="scramble-visualizer-space"></div>
    </div>

    <script src="../components/header/header.js"></script>
    <script src="../scripts/handleNavigation.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <script src="../scripts/scrambleVisualizer2x2.js"></script>
    <script src="../scripts/scrambleGenerator2x2.js"></script>
    <script src="../scripts/training-2x2.js"></script>
</body>
</html>
