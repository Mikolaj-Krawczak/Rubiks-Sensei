<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Sensei - Trening 3x3</title>
    <link rel="stylesheet" href="../css/training-3x3.css"> <!-- We'll need to create this CSS file -->
</head>
<body>
    <header-component></header-component>

    <div class="content">
        <div class="background-container"></div>

        <div class="training-container">
            <div class="info-panel">
                <div class="mode-selection">
                    <button id="single-solve-btn" class="mode-btn active">Pojedyncze</button>
                    <div class="series-mode">
                        <button id="series-solve-btn" class="mode-btn">Seria</button>
                        <input type="number" id="series-count" value="5" min="2" max="100" disabled>
                    </div>
                </div>
                <div class="scramble-controls">
                    <label for="scramble-length">Długość:</label>
                    <input type="number" id="scramble-length" value="20" min="5" max="30">
                    <button id="regen-scramble-btn">Nowy Scramble</button>
                </div>
                <div id="scramble-display" class="scramble">Scramble: Generowanie...</div>
                <div id="series-times-display"></div>
                <div id="timer-display" class="timer">0.00</div>
                <div id="hint-display" class="hint">Naciśnij Spację, aby rozpocząć/zatrzymać</div>
            </div>
            <div id="cubespace-container">
                 <div id="scramble-visualizer-space"></div>
                 <div class="visualizer-controls">
                    <button id="visualize-scramble-btn">Wykonaj Scramble</button>
                    <button id="reset-visualizer-btn">Reset Kostki</button>
                 </div>
                 <!-- New Speed Controls -->
                 <div class="speed-controls">
                    <span>Tempo mieszania:</span>
                    <label>
                        <input type="radio" name="scramble-speed" value="instant" checked>
                        Natychmiast
                    </label>
                    <label>
                        <input type="radio" name="scramble-speed" value="animated">
                        Animowane
                    </label>
                    <!-- Animation speed slider -->
                    <div class="animation-speed-control">
                        <label for="animation-speed">Prędkość animacji:</label>
                        <input type="range" id="animation-speed" min="50" max="500" value="300" step="50">
                        <span id="speed-value">300ms</span>
                    </div>
                 </div>
            </div>
        </div>

    </div>

    <script src="../components/header/header.js"></script>
    <script src="../scripts/handleNavigation.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    <script src="../scripts/scrambleVisualizer.js"></script>
    <script src="../scripts/scrambleGenerator.js"></script>
    <script src="../scripts/training-3x3.js"></script>
</body>
</html>
